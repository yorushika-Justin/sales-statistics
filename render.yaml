services:
  - type: web
    name: sales-statistics
    runtime: python
    buildCommand: |
      sudo apt-get update && sudo apt-get install -y fonts-wqy-zenhei
      pip install -r requirements.txt
    startCommand: python 程序端/web_server.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OUTPUT_DIR
        value: /opt/render/project/output
